<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2960" viewBox="0 0 1600 2960"><rect width="1600" height="2960" fill="#F7F4EF"/><text x="120" y="95" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="34" font-weight="800" fill="#244C38" text-anchor="start">Recommended About Page Flow</text><text x="120" y="135" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="21" font-weight="650" fill="#6B6B5F" text-anchor="start">A mockup for fitting the full draft copy without making the page feel crowded.</text><rect x="90" y="190" width="1420" height="360" rx="14" fill="rgba(255,255,255,.72)" stroke="#E8E0D0"/><text x="800" y="275" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="42" font-weight="800" fill="#244C38" text-anchor="middle">Why I started Inbox to Ops Co.</text><text x="800" y="335" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="27" font-weight="800" fill="#B08A4A" text-anchor="middle">I know how quickly the small things become the heavy things.</text><text x="800" y="390" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="24" font-weight="650" fill="#2C2C28" text-anchor="middle">The inbox that needs attention. The calendar that keeps shifting. The follow-up that still</text>
<text x="800" y="425" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="24" font-weight="650" fill="#2C2C28" text-anchor="middle">needs to happen. The client details that live in your head. The project that has no clear</text>
<text x="800" y="460" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="24" font-weight="650" fill="#2C2C28" text-anchor="middle">home. The workflow you keep meaning to organize.</text><text x="800" y="500" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="24" font-weight="800" fill="#2C2C28" text-anchor="middle">Most business owners are not disorganized because they do not care. They are</text>
<text x="800" y="534" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="24" font-weight="800" fill="#2C2C28" text-anchor="middle">overwhelmed because they are carrying too many pieces at once.</text><text x="800" y="655" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="40" font-weight="800" fill="#244C38" text-anchor="middle">How I bring calm to the moving pieces</text><rect x="90" y="710" width="650" height="510" rx="14" fill="#EEF4EA" stroke="#E8E0D0"/><text x="140" y="775" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="30" font-weight="800" fill="#244C38" text-anchor="start">Use this as a warm story section,</text>
<text x="140" y="811" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="30" font-weight="800" fill="#244C38" text-anchor="start">not tiny cards</text><text x="140" y="865" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="22" font-weight="650" fill="#2C2C28" text-anchor="start">Calm and organization are not just work values for me.</text>
<text x="140" y="899" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="22" font-weight="650" fill="#2C2C28" text-anchor="start">They are part of how I try to live. I care about balance,</text>
<text x="140" y="933" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="22" font-weight="650" fill="#2C2C28" text-anchor="start">self-improvement, and learning what supports a healthier,</text>
<text x="140" y="967" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="22" font-weight="650" fill="#2C2C28" text-anchor="start">more sustainable way of working and living.</text><text x="140" y="1045" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="22" font-weight="650" fill="#2C2C28" text-anchor="start">That carries into how I work with clients. The way your</text>
<text x="140" y="1079" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="22" font-weight="650" fill="#2C2C28" text-anchor="start">business runs should help create more clarity, not more</text>
<text x="140" y="1113" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="22" font-weight="650" fill="#2C2C28" text-anchor="start">noise.</text><text x="140" y="1160" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="22" font-weight="800" fill="#B08A4A" text-anchor="start">This keeps the personal copy human and grounded while</text>
<text x="140" y="1192" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="22" font-weight="800" fill="#B08A4A" text-anchor="start">the cards summarize the takeaways.</text><rect x="790" y="710" width="320" height="240" rx="14" fill="#FFFFFF" stroke="#E8E0D0"/><circle cx="950" cy="778" r="40" fill="#DDE8D8"/><path d="M950 802 V752 M950 775 C921 775 916 751 916 751 C941 751 950 765 950 775 M950 782 C979 782 984 758 984 758 C959 758 950 772 950 782" fill="none" stroke="#244C38" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><text x="950" y="855" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="27" font-weight="800" fill="#244C38" text-anchor="middle">Order from the mess</text><text x="950" y="915" font-family="Avenir, Montserrat, Arial, sans-serif" font-size="20" font-weight="650" fill="#2C2C28" text-anchor="middle">Notice what keeps falling</text>
